minimum_pre_commit_version: "4.2.0"
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run --locked ruff check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: Ruff format
        entry: uv run --locked ruff format --check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: mypy
        name: mypy strict
        entry: uv run --locked mypy
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: unit-tests
        name: Unit tests
        entry: uv run --locked pytest tests/unit
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: architecture
        name: Architecture contracts
        entry: uv run --locked lint-imports
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
