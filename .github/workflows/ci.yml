name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.28"

jobs:
  quality:
    name: Quality and architecture
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run --locked ruff check .

      - name: Check formatting
        run: uv run --locked ruff format --check .

      - name: Type check
        run: uv run --locked mypy

      - name: Check architecture contracts
        run: uv run --locked lint-imports

      - name: Test with coverage
        run: >-
          uv run --locked pytest
          --cov=astraweft
          --cov-report=term-missing
          --cov-report=xml

      - name: Audit Python dependencies
        run: uv run --locked pip-audit --timeout 60 --progress-spinner off

  package:
    name: Build and inspect package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked --dev

      - name: Build source and wheel distributions
        run: uv build

      - name: Validate package metadata
        run: uv run --locked twine check dist/*

      - name: Inspect wheel contents
        run: uv run --locked check-wheel-contents dist/*.whl

      - name: Smoke test wheel
        run: >-
          uv run --isolated --no-project
          --with ${{ github.workspace }}/dist/*.whl
          --with pytest
          pytest tests/smoke_test.py

  cross-platform-smoke:
    name: Smoke / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked --dev

      - name: Run process and package smoke tests
        run: uv run --locked pytest tests/unit tests/integration tests/smoke_test.py

      - name: Verify console entry point
        run: uv run --locked astraweft --version

  desktop-package-smoke:
    name: Desktop package / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true

      - name: Install locked release dependencies
        run: uv sync --locked --all-groups

      - name: Build native desktop package
        run: uv run --locked python scripts/build_desktop.py

      - name: Verify and archive native payload
        run: >-
          uv run --locked python scripts/verify_release_manifest.py
          --dist-dir dist/desktop
          --output build/phase8/manifest-verification.json
          --archive-dir build/phase8/release-artifacts

      - name: Exercise packaged cold start and database initialization
        run: >-
          uv run --locked python scripts/smoke_desktop.py
          --expected-revision 20260715_0007
          --output build/phase8/package-smoke.json

      - name: Upload native package evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: astraweft-desktop-${{ matrix.os }}-${{ github.sha }}
          path: |
            build/phase8/release-artifacts/*
            build/phase8/manifest-verification.json
            build/phase8/package-smoke.json
          if-no-files-found: error
          retention-days: 14

  python-compatibility:
    name: Python / ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked --dev

      - name: Run compatibility tests
        run: uv run --locked pytest tests/unit tests/integration tests/smoke_test.py
