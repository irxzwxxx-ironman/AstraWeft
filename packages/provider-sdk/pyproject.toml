[build-system]
requires = ["hatchling>=1.27,<2"]
build-backend = "hatchling.build"

[project]
name = "astraweft-provider-sdk"
version = "0.1.0.dev0"
description = "Stable public Provider plugin API and contract kit for AstraWeft."
readme = "README.md"
requires-python = ">=3.12,<3.14"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "AstraWeft Contributors" }]
dependencies = [
  "jsonschema>=4.25,<5",
  "packaging>=25,<27",
]

[tool.hatch.build.targets.wheel]
packages = ["src/astraweft_provider_sdk"]

[tool.hatch.build.targets.sdist]
include = ["/src", "/tests", "/README.md", "/LICENSE", "/NOTICE"]
